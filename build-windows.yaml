name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pygame numpy pyinstaller
          pip install pyaudio --find-links https://github.com/nickel-lang/pyaudio-wheels/releases/download/v0.2.14/PyAudio-0.2.14-cp311-cp311-win_amd64.whl

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller --onefile --windowed --name "BirthdayCandle" --hidden-import pyaudio main.py

      - name: Upload EXE as artifact
        uses: actions/upload-artifact@v4
        with:
          name: BirthdayCandle-Windows
          path: dist/BirthdayCandle.exe