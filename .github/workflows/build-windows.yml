name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pipwin and dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pipwin
          pipwin install pyaudio
          pip install pygame numpy pyinstaller

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller --onefile --windowed --name "BirthdayCandle" main.py

      - name: Upload EXE as artifact
        uses: actions/upload-artifact@v4
        with:
          name: BirthdayCandle-Windows
          path: dist/BirthdayCandle.exe
